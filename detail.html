<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d0e1a; --card: #1a1b2e; --card-hover: #222340;
  --text: rgba(255,255,255,0.85); --text2: rgba(255,255,255,0.55); --text3: rgba(255,255,255,0.3);
  --border: rgba(255,255,255,0.06); --accent: #4a9eff; --accent2: #7c3aed;
  --green: #00b894; --yellow: #fdcb6e;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6; padding: 2rem;
}
.container { max-width: 900px; margin: 0 auto; }

.back-link {
  display: inline-flex; align-items: center; gap: .3rem;
  color: var(--text2); text-decoration: none; font-size: .85rem;
  margin-bottom: 1.5rem; transition: color .2s;
}
.back-link:hover { color: var(--accent); }

.hero {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 2rem; margin-bottom: 1.5rem; position: relative; overflow: hidden;
}
.hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.hero-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem; margin-bottom: .6rem; }
.hero-name { font-size: 1.5rem; font-weight: 700; color: #fff; }
.hero-actions { display: flex; gap: .4rem; flex-wrap: wrap; }
.status-badge { font-size: .72rem; font-weight: 600; padding: .15rem .6rem; border-radius: 4px; color: #fff; letter-spacing: .3px; }
.priority-badge { font-size: .72rem; color: var(--text3); padding: .15rem .45rem; border: 1px solid var(--border); border-radius: 4px; }

.edit-btn {
  padding: .3rem .7rem; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer; font-size: .78rem; transition: all .2s;
}
.edit-btn:hover { color: var(--accent); border-color: rgba(74,158,255,0.3); background: rgba(74,158,255,0.08); }
.edit-btn.active { background: rgba(74,158,255,0.1); color: var(--accent); }

.meta-row { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; margin-bottom: .8rem; }
.tags { display: flex; gap: .35rem; flex-wrap: wrap; }
.tag { font-size: .72rem; padding: .1rem .5rem; border-radius: 4px; background: rgba(74,158,255,0.1); color: rgba(74,158,255,0.8); border: 1px solid rgba(74,158,255,0.15); }
.repo-link { font-size: .78rem; color: var(--text3); text-decoration: none; }
.repo-link:hover { color: var(--accent); }

.progress-overall { margin-top: .5rem; }
.progress-overall .bar { display: flex; align-items: center; gap: .6rem; }
.progress-overall .track { flex: 1; height: 8px; border-radius: 4px; background: rgba(255,255,255,0.06); overflow: hidden; }
.progress-overall .fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .6s ease; }
.progress-overall .label { font-size: .85rem; color: var(--text2); white-space: nowrap; }

.section-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 1.25rem; margin-bottom: .85rem; transition: border-color .2s;
}
.section-card:hover { border-color: rgba(74,158,255,0.12); }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
.section-title { font-size: .9rem; font-weight: 600; color: var(--text); }
.section-count { font-size: .78rem; color: var(--text3); }
.section-progress { margin-bottom: .75rem; }
.section-progress .bar { display: flex; align-items: center; gap: .5rem; }
.section-progress .track { flex: 1; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
.section-progress .fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .6s ease; }
.section-progress .fill.full { background: linear-gradient(90deg, var(--green), #00cec9); }
.section-progress .label { font-size: .75rem; color: var(--text3); white-space: nowrap; }

.task-item {
  display: flex; align-items: center; gap: .4rem; padding: .2rem 0;
  font-size: .85rem; color: var(--text2);
}
.task-item.done { color: var(--text3); text-decoration: line-through; }
.task-check { flex-shrink: 0; width: 1rem; text-align: center; font-size: .75rem; cursor: default; }
.task-item.done .task-check { color: var(--green); }
.task-text { flex: 1; }

.editing .task-check { cursor: pointer; }
.editing .task-check:hover { color: var(--accent); }
.editing .task-item.done .task-check:hover { color: var(--yellow); }
.editing .task-item { border-radius: 4px; padding: .2rem .3rem; margin: 0 -.3rem; }
.editing .task-item:hover { background: rgba(255,255,255,0.03); }

.task-del {
  opacity: 0; flex-shrink: 0; width: 1.2rem; height: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  border: none; background: rgba(255,255,255,0.06); color: var(--text3);
  border-radius: 4px; cursor: pointer; font-size: .7rem; transition: all .2s;
}
.task-item:hover .task-del { opacity: .6; }
.task-del:hover { opacity: 1 !important; color: #e17055; background: rgba(225,112,85,0.15); }

.add-task-form {
  display: flex; gap: .4rem; margin-top: .5rem; padding-top: .5rem;
  border-top: 1px solid var(--border);
}
.add-task-form input {
  flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 6px; padding: .35rem .6rem; color: var(--text); font-size: .82rem; outline: none;
}
.add-task-form input:focus { border-color: rgba(74,158,255,0.3); }
.add-task-form button {
  padding: .35rem .7rem; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer; font-size: .78rem; transition: all .2s;
}
.add-task-form button:hover { background: rgba(74,158,255,0.1); color: var(--accent); }

.editing .status-badge { appearance: none; border: 1px solid var(--border); border-radius: 4px; padding: .1rem .35rem; background: transparent; color: var(--text); font-size: .72rem; cursor: pointer; }
.editing .priority-badge { appearance: none; border: 1px solid var(--border); border-radius: 4px; padding: .1rem .35rem; background: transparent; color: var(--text); font-size: .72rem; cursor: pointer; }

.save-bar {
  display: none; position: sticky; bottom: 1rem; justify-content: center; gap: .5rem;
  margin-top: 1.5rem; padding: .75rem; background: var(--card); border: 1px solid var(--accent);
  border-radius: 12px; z-index: 100; flex-wrap: wrap;
}
.editing .save-bar { display: flex; }
.save-btn {
  padding: .5rem 1rem; border-radius: 8px; font-size: .82rem; font-weight: 500;
  border: none; cursor: pointer; transition: all .2s;
}
.save-btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
.save-btn.primary:hover { box-shadow: 0 4px 16px rgba(74,158,255,0.35); }
.save-btn.secondary { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.save-btn.secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
.save-btn.danger { background: transparent; color: #e17055; border: 1px solid rgba(225,112,85,0.3); }
.save-btn.danger:hover { border-color: #e17055; }

.toast {
  position: fixed; top: 1.5rem; right: 1.5rem;
  padding: .6rem 1rem; border-radius: 8px; font-size: .82rem;
  background: var(--card); border: 1px solid var(--border); color: var(--text2);
  opacity: 0; transform: translateY(-.5rem); transition: all .3s;
  pointer-events: none; z-index: 200;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { border-color: rgba(0,184,148,0.3); color: var(--green); }

.storage-badge {
  display: inline-flex; align-items: center; gap: .3rem;
  font-size: .72rem; color: var(--text3); padding: .1rem .5rem;
  border: 1px solid var(--border); border-radius: 4px;
}
.storage-badge.local { color: var(--green); border-color: rgba(0,184,148,0.2); background: rgba(0,184,148,0.05); }

.empty { text-align: center; color: var(--text3); padding: 3rem; font-size: .9rem; }

@media (max-width: 600px) {
  body { padding: 1rem; }
  .hero { padding: 1.25rem; }
  .hero-name { font-size: 1.2rem; }
}
</style>

            text: "Pure Pursuit 锥桶跟踪算法",
            done: true
          },
          {
            text: "5G A/B 停车区识别（图像处理）",
            done: true
          }
        ]
      },
      {
        name: "待完成",
        tasks: [
          {
            text: "避障模块（DWA + 超声波融合）",
            done: false
          },
          {
            text: "实车联调与参数整定",
            done: false
          },
          {
            text: "比赛文档撰写",
            done: false
          }
        ]
      }
    ]
  }
];
// /SYNC:ALL_PROJECTS

// localStorage storage key
const SAVED_KEY = 'workspace_projects_data';

let allProjects = [];   // all projects loaded from storage
let currentProject = null;
let isEditing = false;

function clone(o) { return JSON.parse(JSON.stringify(o)); }

// Load projects: localStorage first, fallback to embedded
function loadProjects() {
  const saved = localStorage.getItem(SAVED_KEY);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      if (Array.isArray(data) && data.length > 0) return data;
    } catch(e) {}
  }
  return clone(ALL_PROJECTS);
}

// Save all projects to localStorage
function persistProjects() {
  localStorage.setItem(SAVED_KEY, JSON.stringify(allProjects));
}

function getProject() {
  const id = location.hash.slice(1) || 'blog';
  return allProjects.find(p => p.id === id);
}

function calcProgress(section) {
  const total = section.tasks.length;
  const done = section.tasks.filter(t => t.done).length;
  return { total, done, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
}

function render() {
  allProjects = loadProjects();
  currentProject = getProject();
  if (!currentProject) {
    document.getElementById('app').innerHTML = '<div class="empty">项目未找到</div>';
    return;
  }
  document.title = '项目详情 · ' + currentProject.name;
  isEditing = false;
  renderView();
}

function renderView() {
  const p = currentProject;
  document.body.classList.toggle('editing', isEditing);
  const hasSaved = localStorage.getItem(SAVED_KEY) !== null;

  const overall = p.sections.reduce((acc, s) => {
    const t = calcProgress(s); return { total: acc.total + t.total, done: acc.done + t.done };
  }, { total: 0, done: 0 });
  const overallPct = overall.total > 0 ? Math.round((overall.done / overall.total) * 100) : 0;

  const editBtn = `<button class="edit-btn${isEditing ? ' active' : ''}" onclick="toggleEdit()">${isEditing ? '编辑中' : '编辑'}</button>`;

  const sectionCards = p.sections.map((s, si) => {
    const t = calcProgress(s);
    const tasksHTML = s.tasks.map((task, ti) => `
      <div class="task-item${task.done ? ' done' : ''}">
        <span class="task-check" onclick="${isEditing ? `editToggleTask(${si},${ti})` : ''}">${task.done ? '✓' : '○'}</span>
        <span class="task-text">${escHtml(task.text)}</span>
        ${isEditing ? `<button class="task-del" onclick="editDeleteTask(${si},${ti})">×</button>` : ''}
      </div>
    `).join('');
    const addForm = isEditing ? `
      <div class="add-task-form">
        <input id="newTaskInput_${si}" placeholder="新任务，回车添加" onkeydown="if(event.key==='Enter')editAddTask(${si})">
        <button onclick="editAddTask(${si})">+ 添加</button>
      </div>` : '';
    return `
    <div class="section-card">
      <div class="section-header">
        <span class="section-title">${escHtml(s.name)}</span>
        <span class="section-count">${t.done}/${t.total}</span>
      </div>
      <div class="section-progress">
        <div class="bar"><div class="track"><div class="fill${t.pct === 100 ? ' full' : ''}" style="width:${t.pct}%"></div></div><span class="label">${t.pct}%</span></div>
      </div>
      ${tasksHTML}
      ${addForm}
    </div>`;
  }).join('');

  const statusOpts = Object.keys(STATUS_LABELS).map(k =>
    `<option value="${k}"${p.status===k?' selected':''}>${STATUS_LABELS[k]}</option>`
  ).join('');
  const priorityOpts = Object.keys(PRIORITY_LABELS).map(k =>
    `<option value="${k}"${p.priority===k?' selected':''}>${PRIORITY_LABELS[k]}</option>`
  ).join('');

  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="hero">
    <div class="hero-top">
      <div class="hero-name">${escHtml(p.name)}</div>
      <div class="hero-actions">
        ${isEditing
          ? `<select class="status-badge" style="background:${STATUS_COLORS[p.status]}" onchange="editChangeStatus(this.value)">${statusOpts}</select>
             <select class="priority-badge" onchange="editChangePriority(this.value)">${priorityOpts}</select>`
          : `<span class="status-badge" style="background:${STATUS_COLORS[p.status]}">${STATUS_LABELS[p.status]}</span>
             <span class="priority-badge">${PRIORITY_LABELS[p.priority]}</span>`}
        ${editBtn}
        <span class="storage-badge${hasSaved ? ' local' : ''}">${hasSaved ? '💾 本地已保存' : '📄 初始数据'}</span>
      </div>
    </div>
    <div class="meta-row">
      <div class="tags">${p.tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}</div>
      ${p.repo ? `<a class="repo-link" href="${p.repo}" target="_blank">${p.repo.replace('https://github.com/', '')}</a>` : ''}
    </div>
    <div class="progress-overall">
      <div class="bar"><div class="track"><div class="fill" style="width:${overallPct}%"></div></div><span class="label">${overall.done}/${overall.total} · ${overallPct}%</span></div>
    </div>
  </div>
  ${sectionCards}
  <div class="save-bar">
    <button class="save-btn primary" onclick="showToast('✅ 已自动保存到浏览器')">💾 保存到本地</button>
    <button class="save-btn secondary" onclick="exportMd()">📥 导出为 .md</button>
    <button class="save-btn danger" onclick="resetData()">↻ 重置</button>
    <button class="save-btn secondary" onclick="editCancel()">取消</button>
  </div>`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Edit actions: mutate → persist → re-render ──

function toggleEdit() {
  isEditing = !isEditing;
  if (!isEditing) editCancel();
  renderView();
}

function editToggleTask(si, ti) {
  currentProject.sections[si].tasks[ti].done = !currentProject.sections[si].tasks[ti].done;
  persistCurrent();
  renderView();
}

function editAddTask(si) {
  const input = document.getElementById('newTaskInput_' + si);
  if (!input || !input.value.trim()) return;
  currentProject.sections[si].tasks.push({ text: input.value.trim(), done: false });
  persistCurrent();
  renderView();
}

function editDeleteTask(si, ti) {
  currentProject.sections[si].tasks.splice(ti, 1);
  persistCurrent();
  renderView();
}

function editChangeStatus(v) { currentProject.status = v; persistCurrent(); renderView(); }
function editChangePriority(v) { currentProject.priority = v; persistCurrent(); renderView(); }

function editCancel() {
  isEditing = false;
  allProjects = loadProjects(); // reload from storage (discard unsaved)
  currentProject = getProject();
  renderView();
}

function persistCurrent() {
  // Update the project in allProjects
  const idx = allProjects.findIndex(p => p.id === currentProject.id);
  if (idx !== -1) allProjects[idx] = currentProject;
  persistProjects();
}

// ── Export .md for git sync ──

function exportMd() {
  const p = currentProject;
  const lines = ['---'];
  lines.push('name: ' + p.name);
  lines.push('status: ' + p.status);
  lines.push('priority: ' + p.priority);
  lines.push('tags: [' + p.tags.join(', ') + ']');
  if (p.repo) lines.push('repo: ' + p.repo);
  lines.push('---');
  lines.push('');
  p.sections.forEach(s => {
    lines.push('## ' + s.name);
    s.tasks.forEach(t => lines.push('- [' + (t.done ? 'x' : ' ') + '] ' + t.text));
    lines.push('');
  });

  const blob = new Blob([lines.join('\n').replace(/\n{3,}/g, '\n\n')], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = p.id + '.md';
  a.click();
  URL.revokeObjectURL(url);
  showToast('📥 ' + p.id + '.md 已下载，覆盖到 projects/ 目录', 'success');
}

// ── Reset ──

function resetData() {
  if (!confirm('重置将清除所有本地修改，恢复到初始数据。确认？')) return;
  localStorage.removeItem(SAVED_KEY);
  showToast('↻ 已重置，数据恢复到初始状态', 'success');
  render();
}

// ── Persistence ──

function persistProjects() {
  localStorage.setItem(SAVED_KEY, JSON.stringify(allProjects));
}

function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => el.classList.remove('show'), 3500);
}

window.addEventListener('hashchange', render);
render();
</script>
